<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Purchase Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h2>Purchase Successful!</h2>

<p>Your travel insurance has been successfully purchased.</p>

<h3>Policy Details</h3>
<ul>
    <li>Policy ID: <span th:text="${policy.id}"></span></li>
    <li>Coverage: <span th:text="${policy.coverage}"></span></li>
    <li>Area: <span th:text="${policy.area}"></span></li>
    <li>Plan: <span th:text="${policy.plan}"></span></li>
    <li>Start Date: <span th:text="${policy.startDate}"></span></li>
    <li>End Date: <span th:text="${policy.endDate}"></span></li>
    <li>Price: RM <span th:text="${policy.price}"></span></li>
</ul>

<h3>Customer Details</h3>
<ul>
    <li>Name: <span th:text="${policy.customer.fullName}"></span></li>
    <li>NRIC: <span th:text="${policy.customer.nric}"></span></li>
    <li>Mobile: <span th:text="${policy.customer.mobile}"></span></li>
    <li>Email: <span th:text="${policy.customer.email}"></span></li>
    <li>Address: <span th:text="${policy.customer.addressLine1}"></span>,
        <span th:text="${policy.customer.addressLine2}"></span>,
        <span th:text="${policy.customer.postCode}"></span>
    </li>
</ul>

<a href="/" class="btn btn-success mt-3">Back to Home</a>

</body>
</html>
