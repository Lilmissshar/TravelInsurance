<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Travel Insurance Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<!-- Display error message if exists -->
<p th:if="${errorMessage}" class="text-danger">
    <span th:text="${errorMessage}"></span>
</p>

<h2>Insurance Summary</h2>

<h3>Travel Details</h3>
<ul>
    <li>Coverage: <span th:text="${request.coverage}"></span></li>
    <li>Area: <span th:text="${request.area}"></span></li>
    <li>Start Date: <span th:text="${request.startDate}"></span></li>
    <li>End Date: <span th:text="${request.endDate}"></span></li>
    <li>Plan: <span th:text="${request.plan}"></span></li>
</ul>

<h3>Customer Details</h3>
<ul>
    <li>Name: <span th:text="${request.fullName}"></span></li>
    <li>NRIC: <span th:text="${request.nric}"></span></li>
    <li>Mobile: <span th:text="${request.mobile}"></span></li>
    <li>Email: <span th:text="${request.email}"></span></li>
    <li>Address Line 1: <span th:text="${request.addressLine1}"></span></li>
    <li>Address Line 2: <span th:text="${request.addressLine2}"></span></li>
    <li>Postcode: <span th:text="${request.postCode}"></span></li>
</ul>

<h3>Price</h3>
<p>RM <span th:text="${price}"></span></p>

<!-- Confirm Purchase Form -->
<form th:action="@{/confirm}" method="post" th:object="${request}">
    <input type="hidden" th:field="*{coverage}">
    <input type="hidden" th:field="*{area}">
    <input type="hidden" th:field="*{startDate}">
    <input type="hidden" th:field="*{endDate}">
    <input type="hidden" th:field="*{plan}">
    <input type="hidden" th:field="*{fullName}">
    <input type="hidden" th:field="*{nric}">
    <input type="hidden" th:field="*{mobile}">
    <input type="hidden" th:field="*{email}">
    <input type="hidden" th:field="*{addressLine1}">
    <input type="hidden" th:field="*{addressLine2}">
    <input type="hidden" th:field="*{postCode}">

    <button type="submit" class="btn btn-primary mt-3">Confirm Purchase</button>
</form>

</body>
</html>
