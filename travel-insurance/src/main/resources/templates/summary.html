<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">
    <title>Travel Insurance Summary</title>
</head>
<body>

<h2>Insurance Summary</h2>

<h3>Travel Details</h3>

Coverage: <span th:text="${coverage}"></span><br>
Area: <span th:text="${area}"></span><br>
Start Date: <span th:text="${startDate}"></span><br>
End Date: <span th:text="${endDate}"></span><br>
Plan: <span th:text="${plan}"></span><br>

<h3>Customer Details</h3>

Name: <span th:text="${fullName}"></span><br>
NRIC: <span th:text="${nric}"></span><br>
Mobile: <span th:text="${mobile}"></span><br>
Email: <span th:text="${email}"></span><br>

<h3>Price</h3>

RM <span th:text="${price}"></span>

<br><br>

<form action="/confirm" method="post">

    <input type="hidden" name="coverage" th:value="${coverage}">
    <input type="hidden" name="area" th:value="${area}">
    <input type="hidden" name="startDate" th:value="${startDate}">
    <input type="hidden" name="endDate" th:value="${endDate}">
    <input type="hidden" name="plan" th:value="${plan}">
    <input type="hidden" name="nric" th:value="${nric}">

    <button type="submit">Confirm Purchase</button>

</form>

</body>
</html>
